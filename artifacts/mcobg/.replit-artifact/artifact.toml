kind = "web"
previewPath = "/"
title = "mcoBG - Multiplayer Backgammon"
version = "1.0.0"
id = "artifacts/mcobg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25725
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mcobg run dev"

[services.env]
PORT = "25725"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mcobg", "run", "build"]
publicDir = "artifacts/mcobg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
